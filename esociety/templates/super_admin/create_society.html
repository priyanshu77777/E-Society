{% extends "super_admin/base_super_admin.html" %}
{% block content %}

<div class="card fade-in">
    <h2>Create Society</h2>

    <form method="POST" action="{% url 'create_society' %}">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Society Name" required>
        <input type="text" name="address" placeholder="Address">
        <input type="text" name="city" placeholder="City">

        <button>Create</button>
</form>
</div>

{% endblock %}
