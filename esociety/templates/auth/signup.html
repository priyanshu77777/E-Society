{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("{% static 'images/PMS.png' %}") no-repeat center;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 15px;
            color: white;
            width: 320px;
            text-align: center;

            animation: fadeInUp 1s ease;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #38bdf8;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role">
            <option value="RESIDENT">Resident</option>
            <option value="SOCIETY_ADMIN">Admin</option>
            <option value="SUPER_ADMIN">Super Admin</option>
        </select>
        
        <select name="society_id" required>
            <option value="">-- Select Society --</option>
            {% for society in societies %}
                <option value="{{ society.id }}">
                    {{ society.name }}
                </option>
            {% endfor %}
        </select>

        <script>
        document.querySelector("select[name='role']").addEventListener("change", function() {
            let societyField = document.querySelector("select[name='society_id']").parentElement;

            if (this.value === "resident") {
                societyField.style.display = "block";
            } else {
                societyField.style.display = "none";
            }
        });
        </script>

        <button type="submit">Signup</button>
    </form>

    <p style="margin-top:15px;">
        Already have account? <a href="{% url 'login' %}" style="color:#38bdf8;">Login</a>
    </p>
</div>

</body>
</html>
