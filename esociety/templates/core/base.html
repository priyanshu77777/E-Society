{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>E-Society</title>
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>E-Society</div>
    <div>
        {{ request.session.member_name }} | {{ request.session.role }}
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'society_list' %}">Society</a>
        <a href="{% url 'member_list' %}">Members</a>
        <a href="{% url 'flat_list' %}">Flats</a>
        <a href="{% url 'maintenance_list' %}">Maintenance</a>
        <a href="{% url 'complaint_list' %}">Complaints</a>
        <a href="{% url 'notice_list' %}">Notices</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
