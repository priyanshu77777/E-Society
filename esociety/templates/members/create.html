{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Add Member</h3>

<div class="card p-4">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Create Member
        </button>

        <a href="{% url 'member_list' %}" 
           class="btn btn-secondary">
           Cancel
        </a>
    </form>
</div>

{% endblock %}
